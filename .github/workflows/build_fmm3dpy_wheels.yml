name: Build and test fmm3dpy wheels

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build fmm3dpy sdist
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: fmm3dpy-sdist
          path: ./dist/*.tar.gz

  build_wheels:
    name: Build fmm3dpy wheels on ${{ matrix.buildplat[1] }}
    runs-on: ${{ matrix.buildplat[0] }}
    strategy:
      fail-fast: false
      matrix:
        buildplat:
          - [ubuntu-22.04, manylinux_x86_64]
          - [macos-15-intel, macosx_x86_64]
          - [macos-14, macosx_arm64]
          - [windows-2022, win_amd64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install "cibuildwheel==3.4.0"

      - name: Install macOS build dependencies
        if: ${{ runner.os == 'macOS' }}
        run: brew install gcc ninja

      - name: Configure macOS compiler environment
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          echo "CIBW_ENVIRONMENT_MACOS=CC=$(ls $(brew --prefix gcc)/bin/gcc-[0-9]* | head -n1) CXX=$(ls $(brew --prefix gcc)/bin/g++-[0-9]* | head -n1) FC=$(ls $(brew --prefix gcc)/bin/gfortran-[0-9]* | head -n1) MACOSX_DEPLOYMENT_TARGET=${{ matrix.buildplat[1] == 'macosx_x86_64' && '15.0' || '14.0' }}" >> "$GITHUB_ENV"

      - name: Install Windows build dependencies
        if: ${{ runner.os == 'Windows' }}
        run: |
          c:\msys64\usr\bin\pacman.exe -Sy --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-gcc-fortran mingw-w64-x86_64-ninja mingw-w64-x86_64-pkgconf
          echo "c:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Build ${{ matrix.buildplat[1] }} wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: "*-${{ matrix.buildplat[1] }}"
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y gcc gcc-c++ gcc-gfortran make
          CIBW_ENVIRONMENT_LINUX: >
            CC=gcc
            CXX=g++
            FC=gfortran
          CIBW_ENVIRONMENT_WINDOWS: >
            CC=gcc
            CXX=g++
            FC=gfortran

      - uses: actions/upload-artifact@v4
        with:
          name: fmm3dpy-wheels-${{ matrix.buildplat[1] }}
          path: ./wheelhouse/*.whl
